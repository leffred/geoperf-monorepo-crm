<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" role="img" aria-label="Geoperf LinkedIn cover">
  <title>Geoperf — bannière LinkedIn 1584x396</title>
  <rect x="0" y="0" width="1584" height="396" fill="#042C53"/>
  <!-- Subtle grid pattern, editorial style -->
  <g opacity="0.06" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="80" x2="1584" y2="80"/>
    <line x1="0" y1="160" x2="1584" y2="160"/>
    <line x1="0" y1="240" x2="1584" y2="240"/>
    <line x1="0" y1="320" x2="1584" y2="320"/>
  </g>
  <!-- Headline -->
  <text x="100" y="180" font-family="'Source Serif Pro', 'Times New Roman', Georgia, serif" font-size="58" font-weight="500" fill="#FFFFFF" letter-spacing="-1.2">Mesurez votre visibilité</text>
  <text x="100" y="240" font-family="'Source Serif Pro', 'Times New Roman', Georgia, serif" font-size="58" font-weight="500" fill="#FFFFFF" letter-spacing="-1.2">dans les LLM<tspan fill="#EF9F27">.</tspan></text>
  <!-- Sub-headline -->
  <line x1="100" y1="270" x2="280" y2="270" stroke="#EF9F27" stroke-width="2"/>
  <text x="100" y="305" font-family="'Inter', -apple-system, sans-serif" font-size="18" font-weight="400" fill="#FFFFFF" opacity="0.85" letter-spacing="0.3">Études sectorielles · Audits · Optimisation GEO</text>
  <!-- Wordmark right -->
  <text x="1300" y="220" font-family="'Source Serif Pro', 'Times New Roman', Georgia, serif" font-size="64" font-weight="500" fill="#FFFFFF" letter-spacing="-1.5" text-anchor="middle">Ge<tspan fill="#EF9F27">·</tspan>perf</text>
  <text x="1300" y="248" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" opacity="0.7" letter-spacing="3" text-anchor="middle">L L M   V I S I B I L I T Y   R E S E A R C H</text>
</svg>
